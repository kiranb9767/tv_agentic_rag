<p>Insert the antenna plug firmly into the&#160;<span class="color_white">Antenna</span>&#160;socket at the back of the TV.</p>
<p>You can connect your own antenna or an antenna signal from an antenna distribution system. Use an IEC Coax 75 Ohm RF antenna connector.</p>
<p>Use this antenna connection for DVB-T and DVB-C input signals.</p>
