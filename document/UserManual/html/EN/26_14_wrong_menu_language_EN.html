<h1>Change the language back to your language</h1>
<ol>
<li>Press <span class="icon color_white">&#57509;</span><span class="color_white">&#160;Home</span> and select <span class="color_white">Settings</span> via the icon at the top right corner.</li>
<li>Press 8 times <span class="icon color_white">&#57502;</span>&#160;(down) and press&#160;<span class="color_white">OK</span>.</li>
<li>Press&#160;<span class="color_white">OK</span> again to enter <span class="color_white">Language</span>, select the first item <span class="color_white">Menu language</span> and&#160;press&#160;<span class="color_white">OK</span>.</li>
<li>Select your language and press&#160;<span class="color_white">OK</span>.</li>
</ol>
