<p>Select <span class="color_white">Channel info</span> to view the technical information of the channel.</p>
<p>To call up the details of the selected channel&#8230;</p>
<ol>
<li>Tune to the channel.</li>
<li>Press <span class="color_white">OPTIONS</span>, select&#160;<span class="color_white">Channel info</span> and press&#160;<span class="color_white">OK</span> to open the channel info.</li>
<li>Press <span class="color_white">OPTIONS</span>&#160;again or press <span class="icon color_white">&#57497;</span><span class="color_white">&#160;Back</span> to close the&#160;channel info.</li>
</ol>
