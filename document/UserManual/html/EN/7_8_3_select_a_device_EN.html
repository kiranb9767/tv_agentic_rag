<p>To select a wireless device:</p>
<ol>
<li>Select&#160;<span class="icon color_white">&#57509;</span>&#160;<span class="color_white">(Home)</span> &gt; <span class="color_white">Settings</span> &gt; <span class="color_white">Wireless &amp; Networks</span> and press&#160;<span class="color_white">OK</span>.</li>
<li>Select&#160;<span class="color_white">Bluetooth&#160;</span>&gt; <span class="color_white"><span class="color_white">Bluetooth devices</span> </span>and press&#160;<span class="color_white">OK</span>.</li>
<li>In the list, select the wireless device and press&#160;<span class="color_white">OK</span>.</li>
<li>Press&#160;<span class="icon color_white">&#57618;</span>&#160;(left) repeatedly if necessary, to close the menu.</li>
</ol>
