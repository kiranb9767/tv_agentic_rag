<h1>Set the Voice Assistant</h1>
<p><span class="icon color_white">&#57509;</span>&#160;<span class="color_white">(Home)</span>&#160;&gt;&#160;<span class="color_white">Settings</span> &gt;&#160;<span class="color_white">General settings</span>&#160;&gt; <span class="color_white">Voice Assistant settings</span></p>
<p>Turn on or off the <span class="color_white">Voice control</span>. When <span class="color_white">Voice control</span> is enabled, you can select <span class="color_white">Preferred language</span>&#160;and preferred&#160;<span class="color_white">Temperature unit</span> of the Voice Assistant.</p>
