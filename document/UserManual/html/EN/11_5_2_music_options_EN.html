<p>When browsing&#160;music files, press <span class="color_white">OPTIONS</span> to get more options.</p>
<p><span class="color_white">Play All</span><br />Play all files in the folder.</p>
<p><span class="color_white"><span class="color_white">List/Thumbnails</span></span><br />View music files with list view or thumbnails view.</p>
<p><span class="color_white">Shuffle off, Shuffle on</span><br />Play songs in sequential order, or at random.</p>
<p><span class="color_white">Repeat, Play once</span><br />Play songs repeatedly or once.</p>
