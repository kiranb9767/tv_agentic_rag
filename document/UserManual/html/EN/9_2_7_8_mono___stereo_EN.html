<p>You can switch the sound of an analogue channel to Mono or Stereo.</p>
<p>To switch to Mono or Stereo&#8230;</p>
<p>Tune to an analogue channel.</p>
<ol>
<li>Press <span class="color_white">OPTIONS</span>, select&#160;<span class="color_white">Mono/Stereo</span>&#160;and press&#160;<span class="icon color_white">&#57521;</span>&#160;(right).</li>
<li>Select&#160;<span class="color_white">Mono</span>&#160;or&#160;<span class="color_white">Stereo</span>&#160;and press&#160;<span class="color_white">OK</span>.</li>
<li>Press&#160;<span class="icon color_white"><span class="icon">&#57618;</span></span>&#160;(left)&#160;repeatedly if necessary, to close the menu.</li>
</ol>
