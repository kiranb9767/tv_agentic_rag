<p>If the TV guide information comes from the broadcaster, you can press&#160;<span class="color_white">Channel up</span>&#160;to view the schedule of one of the next days. Press <span class="color_white">Channel down</span> to go back to the previous day.</p>
<p>Alternatively, you can press <span class="color_white">OPTIONS</span>&#160;and select&#160;<span class="color_white">Change day</span>.</p>
