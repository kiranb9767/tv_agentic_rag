<p>To open the channel list option menu:</p>
<ul>
<li>Press <span class="color_white">TV / EXIT</span>, to switch to TV.</li>
<li>Press <span class="color_white"><span class="color_white"><span class="color_white"><span class="icon">&#57506;</span><span class="color_white"> <span class="color_white"><span class="color_white"><span class="color_white">Channel list</span></span></span></span></span></span></span>&#160;to open the channel list.</li>
<li>Press <span class="color_white">OPTIONS</span>,&#160;and select one of options.</li>
<li>Press&#160;<span class="color_white"><span class="icon color_white">&#57497;</span><span class="color_white">&#160;Back</span></span> to close the channel list.</li>
</ul>
