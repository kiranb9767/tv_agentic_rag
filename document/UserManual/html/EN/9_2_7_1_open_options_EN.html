<p>While watching a channel, you can set some options.</p>
<p>Depending on the type of channel you are watching or depending on the TV settings you made, some options are available.</p>
<p>To open the options menu&#8230;</p>
<ol>
<li>While watching a channel, press <span class="color_white">OPTIONS</span>.</li>
<li>Press <span class="color_white">OPTIONS</span>&#160;again to close.</li>
</ol>
