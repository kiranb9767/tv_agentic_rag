<p>To cast streaming contents to your TV:</p>
<ol style="list-style-type: undefined;">
<li>Make sure your mobile device and TV are on the same Wi-Fi network.</li>
<li>Launch a casting-enabled app on your mobile device and tap the cast icon&#160;<span class="icon color_white">&#57880;</span> .</li>
<li>Select <span class="color_white">PHILIPS_TV_(ModelName)</span> of your TV to start the casting.</li>
</ol>
