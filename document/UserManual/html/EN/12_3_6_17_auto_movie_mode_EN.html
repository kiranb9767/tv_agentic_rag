<h1>Set the Auto movie mode</h1>
<p><span class="icon color_white">&#57509;</span>&#160;<span class="color_white">(Home)</span>&#160;&gt;&#160;<span class="color_white">Settings</span> &gt;&#160;<span class="color_white">General settings</span>&#160;&gt;&#160;<span class="color_white">Auto movie mode</span></p>
<p>Set <span class="color_white">Auto movie mode</span> to <span class="color_white">On</span>, if you want TV to automatically set <span class="color_white">Picture style</span> to <span class="color_white">Movie</span> whenever it is informed by the HDMI device connected to TV.</p>
